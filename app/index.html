<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/interactive-proposals/images/logos/doctalk-symbol-green.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>닥프렌즈 - 환자와 의사, 주치의 관계로의 연결</title>
    <meta name="description" content="파편화된 의료 인프라를 연결하여, 환자와 의사를 1인 1주치의 관계로 연결하는 것을 목표합니다" />
    <!-- GitHub Pages SPA redirect handler -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
